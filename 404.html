<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable · MarketFlow</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%236366F1'/><circle cx='16' cy='16' r='7' fill='none' stroke='white' stroke-width='2.5'/><circle cx='16' cy='16' r='3' fill='white'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #ffffff; --bg-soft: #F5F3FF;
  --text: #111827; --text-muted: #6B7280; --text-light: #9CA3AF;
  --indigo: #6366F1; --violet: #8B5CF6;
  --grad: linear-gradient(135deg, #6366F1, #8B5CF6);
  --line: rgba(99,102,241,0.12);
}
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── Nav ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 48px; border-bottom: 1px solid var(--line);
  background: rgba(255,255,255,0.94); backdrop-filter: blur(16px);
}
.nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 10px; }
.nav-logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--indigo); }

/* ── Scène ── */
#stage {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  padding: 100px 24px 60px;
  position: relative; overflow: hidden;
  background: linear-gradient(160deg, #eceaf8 0%, #F8F7FF 55%, #e8e6f5 100%);
}

/* Grille de fond */
.bg-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(var(--line) 1px, transparent 1px),
                    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 72px 72px;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 72%);
}

/* Lueurs */
.bg-glow {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(99,102,241,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 60%, rgba(139,92,246,0.09) 0%, transparent 55%);
}

/* ── 404 géant ── */
.big-404 {
  position: relative;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(160px, 28vw, 320px);
  line-height: 0.85;
  letter-spacing: -4px;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  animation: fadeUp 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) forwards;
  user-select: none;
}

/* Reflet/ombre sous le 404 */
.big-404::after {
  content: '404';
  position: absolute;
  left: 0; right: 0;
  top: 100%;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0.12;
  transform: scaleY(-1) translateY(-4px);
  mask-image: linear-gradient(to bottom, black 0%, transparent 70%);
  pointer-events: none;
}

.label {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--indigo); margin-bottom: 16px; position: relative;
  opacity: 0; animation: fadeUp 0.7s 0.3s forwards;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 4vw, 48px);
  line-height: 1.1; color: var(--text);
  margin-bottom: 16px; position: relative;
  opacity: 0; animation: fadeUp 0.7s 0.45s forwards;
}

.sub {
  font-size: 15px; color: var(--text-muted); line-height: 1.75;
  max-width: 420px; margin: 0 auto 40px;
  position: relative;
  opacity: 0; animation: fadeUp 0.7s 0.6s forwards;
}

.actions {
  display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
  position: relative;
  opacity: 0; animation: fadeUp 0.7s 0.75s forwards;
}

.btn-primary {
  background: var(--grad); color: #fff;
  padding: 14px 32px; border-radius: 8px;
  font-size: 14px; font-weight: 500; text-decoration: none;
  transition: opacity 0.3s, transform 0.3s;
  box-shadow: 0 8px 24px rgba(99,102,241,0.25);
}
.btn-primary:hover { opacity: 0.88; transform: translateY(-2px); }

.btn-ghost {
  color: var(--text-muted); font-size: 14px; text-decoration: none;
  display: flex; align-items: center; gap: 6px;
  padding: 14px 20px; border: 1px solid var(--line); border-radius: 8px;
  transition: color 0.3s, border-color 0.3s;
}
.btn-ghost:hover { color: var(--indigo); border-color: rgba(99,102,241,0.3); }

/* Links rapides */
.quick-links {
  margin-top: 56px; position: relative;
  opacity: 0; animation: fadeUp 0.7s 0.9s forwards;
}
.quick-links p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-light); margin-bottom: 16px; }
.quick-links-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.quick-link {
  font-size: 13px; color: var(--text-muted); text-decoration: none;
  padding: 7px 16px; border: 1px solid var(--line); border-radius: 20px;
  background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.quick-link:hover { color: var(--indigo); border-color: rgba(99,102,241,0.3); background: #fff; }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Particules flottantes ── */
.particle {
  position: absolute; border-radius: 50%;
  background: var(--grad); opacity: 0.06;
  animation: float linear infinite;
  pointer-events: none;
}
@keyframes float {
  0%   { transform: translateY(0)   rotate(0deg); }
  100% { transform: translateY(-100vh) rotate(360deg); }
}

@media (max-width: 600px) {
  nav { padding: 16px 20px; }
  #stage { padding: 90px 20px 40px; overflow: auto; }
  .big-404 { font-size: clamp(120px, 30vw, 200px); }
}
</style>
</head>
<body>

<nav>
  <a href="home.html" class="nav-logo"><div class="nav-logo-dot"></div>MarketFlow</a>
</nav>

<div id="stage">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Particules générées en JS -->

  <div class="big-404">404</div>

  <p class="label">Page introuvable</p>
  <h1>On a cherché partout.<br>Rien à signaler.</h1>
  <p class="sub">La page que vous cherchez n'existe pas ou a été déplacée. Pas d'inquiétude — nos agents IA sont déjà sur le coup.</p>

  <div class="actions">
    <a href="home.html" class="btn-primary">← Retour à l'accueil</a>
    <a href="home.html#contact" class="btn-ghost">Nous contacter</a>
  </div>

  <div class="quick-links">
    <p>Vous cherchiez peut-être</p>
    <div class="quick-links-row">
      <a href="agents.html" class="quick-link">Agents IA</a>
      <a href="presentation.html" class="quick-link">L'agence</a>
      <a href="formation.html" class="quick-link">Formation</a>
      <a href="realisations.html" class="quick-link">Réalisations</a>
    </div>
  </div>
</div>

<script>
(function () {
  var stage = document.getElementById('stage');
  var count = 12;
  for (var i = 0; i < count; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = Math.random() * 60 + 20;
    p.style.cssText = [
      'width:'  + size + 'px',
      'height:' + size + 'px',
      'left:'   + Math.random() * 100 + '%',
      'bottom:' + (-size) + 'px',
      'animation-duration:' + (Math.random() * 14 + 10) + 's',
      'animation-delay:'    + (Math.random() * 10) + 's',
      'opacity:' + (Math.random() * 0.05 + 0.02)
    ].join(';');
    stage.appendChild(p);
  }
})();
</script>

</body>
</html>
